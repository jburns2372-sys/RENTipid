# NGINX Configuration Template for RENTipid

# Note: This is a template. You must replace 'your-production-domain.com' with your actual domain.
# Save this file to /etc/nginx/sites-available/rentipid and create a symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-production-domain.com www.your-production-domain.com;

    # HTTP to HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-production-domain.com www.your-production-domain.com;

    # SSL Certificate Notes:
    # Use Certbot to generate these: sudo certbot --nginx -d your-production-domain.com
    ssl_certificate /etc/letsencrypt/live/your-production-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-production-domain.com/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Allow large file uploads for KYC and Listing Photos (50MB max)
    client_max_body_size 50M;

    # Next.js Application Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Pass real IPs and protocol
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }

    # Internal routing for local file uploads (if STORAGE_PROVIDER=local)
    # Next.js handles this automatically through /api routes, but if serving static files:
    # location /uploads {
    #     alias /path/to/rentipid/public/uploads;
    #     expires max;
    #     access_log off;
    # }
}
